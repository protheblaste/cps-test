<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CPS Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    margin: 0;
    background: #0f172a;
    color: #e5e7eb;
    font-family: Arial, sans-serif;
    text-align: center;
    /* Ensure content takes full height if needed */
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 { margin-top: 20px; }

  .controls { margin: 15px 0; }

  button, input {
    padding: 8px 12px;
    margin: 4px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
  }

  button {
    background: #38bdf8;
    color: #020617;
    font-weight: bold;
    cursor: pointer;
  }

  .reset-btn { background: #f87171; }

  input { width: 150px; }

  .info {
    color: #94a3b8;
    margin-top: 6px;
  }

  .zones {
    display: flex;
    height: 260px;
    width: 90%; /* meaningful width for the zones */
    max-width: 800px;
    margin: 20px;
    gap: 10px;
  }

  .zone {
    flex: 1;
    background: #020617;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    user-select: none;
  }

  .count { font-size: 36px; }
  .cps { color: #94a3b8; }

  /* New Footer Style */
  .footer {
    margin-top: auto; /* Pushes footer to bottom if flex is used, or just spacing */
    margin-bottom: 20px;
    color: #94a3b8;
    font-size: 14px;
    padding-top: 20px;
  }
</style>
</head>

<body>

<h1>CPS Test (Left / Right)</h1>

<div class="controls">
  <button onclick="setTime(1)">1s</button>
  <button onclick="setTime(5)">5s</button>
  <button onclick="setTime(10)">10s</button>
  <button onclick="setTime(30)">30s</button>
  <button onclick="setTime(60)">60s</button>
  <br>

  <input type="number" id="customTime" min="1" placeholder="Custom time (seconds)">
  <button onclick="setCustom()">Set</button>

  <button class="reset-btn" onclick="resetTest()">Reset CPS</button>
</div>

<div class="info">
  ⏱ Time Selected: <span id="selTime">5</span> seconds | 
  Time Left: <span id="timeLeft">--</span>s
</div>

<div class="zones">
  <div class="zone" id="leftZone">
    <h2>LEFT CLICK</h2>
    <div class="count" id="leftCount">0</div>
    <div class="cps" id="leftCPS">0 CPS</div>
  </div>

  <div class="zone" id="rightZone">
    <h2>RIGHT CLICK</h2>
    <div class="count" id="rightCount">0</div>
    <div class="cps" id="rightCPS">0 CPS</div>
  </div>
</div>

<div class="footer">Made by protheblaste</div>

<script>
let duration = 5;
let timeLeft = 0;
let running = false;
let timer = null;

let left = 0;
let right = 0;

const leftZone = document.getElementById("leftZone");
const rightZone = document.getElementById("rightZone");
const selTime = document.getElementById("selTime");
const timeLeftElem = document.getElementById("timeLeft");

const leftCount = document.getElementById("leftCount");
const rightCount = document.getElementById("rightCount");
const leftCPS = document.getElementById("leftCPS");
const rightCPS = document.getElementById("rightCPS");

function setTime(t) {
  if (running) return;
  duration = t;
  selTime.textContent = t;
}

function setCustom() {
  if (running) return;
  const v = Number(document.getElementById("customTime").value);
  if (v >= 1) {
    duration = v;
    selTime.textContent = v;
  }
}

function startTest() {
  running = true;
  timeLeft = duration;
  left = 0;
  right = 0;
  updateUI();
  updateCPS();
  timeLeftElem.textContent = timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    timeLeftElem.textContent = timeLeft;
    updateCPS();
    if (timeLeft <= 0) endTest();
  }, 1000);
}

function endTest() {
  clearInterval(timer);
  running = false;

  const leftCps = (left / duration).toFixed(2);
  const rightCps = (right / duration).toFixed(2);

  alert(
    "Test Finished!\n\n" +
    "Your LEFT click CPS is: " + leftCps + "\n" +
    "Your RIGHT click CPS is: " + rightCps
  );
}

function resetTest() {
  clearInterval(timer);
  running = false;
  left = 0;
  right = 0;
  timeLeft = 0;
  timeLeftElem.textContent = "--";
  updateUI();
  updateCPS();
}

function updateUI() {
  leftCount.textContent = left;
  rightCount.textContent = right;
}

function updateCPS() {
  const elapsed = duration - timeLeft;
  leftCPS.textContent = elapsed > 0 ? (left / elapsed).toFixed(2) + " CPS" : "0 CPS";
  rightCPS.textContent = elapsed > 0 ? (right / elapsed).toFixed(2) + " CPS" : "0 CPS";
}

/* FINAL CLICK LOCK — NO CROSS CLICK POSSIBLE */
leftZone.addEventListener("pointerdown", (e) => {
  if (e.pointerType !== "mouse") return;
  if (e.buttons !== 1) return; // ONLY LEFT BUTTON
  e.preventDefault();
  if (!running) startTest();
  left++;
  updateUI();
});

rightZone.addEventListener("pointerdown", (e) => {
  if (e.pointerType !== "mouse") return;
  if (e.buttons !== 2) return; // ONLY RIGHT BUTTON
  e.preventDefault();
  if (!running) startTest();
  right++;
  updateUI();
});

/* BLOCK CONTEXT MENU INSIDE ZONES */
[leftZone, rightZone].forEach(zone => {
  zone.addEventListener("contextmenu", e => e.preventDefault());
});
</script>

</body>
</html>
