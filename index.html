<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CPS Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      text-align: center;
      user-select: none;
    }

    h1 { margin-top: 20px; }

    .controls {
      margin: 15px 0;
    }

    button, input {
      padding: 8px 12px;
      margin: 4px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
    }

    .reset-btn {
      background: #f87171;
      color: #020617;
    }

    input {
      width: 90px;
    }

    .zones {
      display: flex;
      height: 260px;
      margin: 20px;
      gap: 10px;
    }

    .zone {
      flex: 1;
      border-radius: 14px;
      background: #020617;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .count {
      font-size: 36px;
      margin: 10px 0;
    }

    .cps {
      color: #94a3b8;
    }

    .info {
      margin-top: 10px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<h1>CPS Test (Left / Right)</h1>

<div class="controls">
  <button onclick="setTime(1)">1s</button>
  <button onclick="setTime(5)">5s</button>
  <button onclick="setTime(10)">10s</button>
  <button onclick="setTime(30)">30s</button>
  <button onclick="setTime(60)">60s</button>
  <input type="number" id="customTime" placeholder="Custom (s)" min="1">
  <button onclick="setCustom()">Set</button>
  <button class="reset-btn" onclick="resetTest()">Reset CPS</button>
</div>

<div class="info">
  Time Selected: <span id="selTime">5</span>s |
  Time Left: <span id="timeLeft">--</span>s
</div>

<div class="zones">
  <div class="zone" id="leftZone">
    <h2>LEFT</h2>
    <div class="count" id="leftCount">0</div>
    <div class="cps" id="leftCPS">0 CPS</div>
  </div>

  <div class="zone" id="rightZone">
    <h2>RIGHT</h2>
    <div class="count" id="rightCount">0</div>
    <div class="cps" id="rightCPS">0 CPS</div>
  </div>
</div>

<script>
  let duration = 5;
  let timeLeft = 0;
  let running = false;
  let timer = null;

  let left = 0;
  let right = 0;

  const leftZone = document.getElementById("leftZone");
  const rightZone = document.getElementById("rightZone");

  function setTime(t) {
    if (running) return;
    duration = t;
    document.getElementById("selTime").textContent = t;
  }

  function setCustom() {
    if (running) return;
    const v = Number(document.getElementById("customTime").value);
    if (v >= 1) {
      duration = v;
      document.getElementById("selTime").textContent = v;
    }
  }

  function startTest() {
    running = true;
    timeLeft = duration;
    left = 0;
    right = 0;
    updateUI();
    updateCPS();

    document.getElementById("timeLeft").textContent = timeLeft;

    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("timeLeft").textContent = timeLeft;
      updateCPS();

      if (timeLeft <= 0) endTest();
    }, 1000);
  }

  function endTest() {
    clearInterval(timer);
    running = false;
    updateCPS();
    alert("Your CPS: " + ((left + right) / duration).toFixed(2));
  }

  function resetTest() {
    clearInterval(timer);
    running = false;
    left = 0;
    right = 0;
    timeLeft = 0;
    document.getElementById("timeLeft").textContent = "--";
    updateUI();
    updateCPS();
  }

  function updateUI() {
    document.getElementById("leftCount").textContent = left;
    document.getElementById("rightCount").textContent = right;
  }

  function updateCPS() {
    const elapsed = duration - timeLeft;
    document.getElementById("leftCPS").textContent =
      elapsed > 0 ? (left / elapsed).toFixed(2) + " CPS" : "0 CPS";
    document.getElementById("rightCPS").textContent =
      elapsed > 0 ? (right / elapsed).toFixed(2) + " CPS" : "0 CPS";
  }

  leftZone.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    if (!running) startTest();
    left++;
    updateUI();
  });

  rightZone.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    if (!running) startTest();
    right++;
    updateUI();
  });

  // 🔥 HARD BLOCK RIGHT CLICK (NO MENU)
  document.addEventListener("mousedown", (e) => {
    e.preventDefault();
  });

  document.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    return false;
  });
</script>

</body>
</html>
